# Electron Builder 配置文件
# @creator dzh
# @created 2026-03-14
# @updated 2026-03-14

appId: com.dzh.data-management
productName: 数据管理系统
copyright: Copyright © 2026 dzh

# 目录配置
directories:
  output: release
  buildResources: assets

# 文件配置
files:
  - main.js
  - preload.js
  - assets/**/*
  - ../frontend/dist/**/*

# 额外资源
extraResources:
  - from: assets
    to: assets

# Windows 配置
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
  icon: assets/icon.ico

# NSIS 安装程序配置
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 数据管理系统

# macOS 配置
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.icns
  category: public.app-category.productivity

# DMG 配置
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Linux 配置
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: assets/icons
  category: Office

# 发布配置（暂不配置自动发布）
publish: null
